{% extends "base.html" %}

{% block title %}系统设置{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <span class="eyebrow">System</span>
        <h1>系统设置</h1>
        <p>配置播放引擎与系统运行策略。</p>
    </div>
</section>

<section class="panel">
    <div class="panel-head">
        <h2>播放引擎</h2>
        <span class="chip info">管理员配置</span>
    </div>
    <form method="post" action="{{ url_for('main.settings') }}" class="schedule-form">
        <label class="check-field">
            <input type="checkbox" name="all_play_via_electron" {% if all_play_via_electron %}checked{% endif %}>
            <span>全部内容走 Electron（本地 / NAS / 直播）</span>
        </label>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存设置</button>
        </div>
    </form>
    <ul class="hint-list">
        <li>开启后可避免 VLC / Electron 来回切换，统一窗口行为（全屏、置顶）。</li>
        <li>RTSP / RTMP 在 Electron 兼容性较弱，系统会自动回退 VLC。</li>
    </ul>
</section>
{% endblock %}
