<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>屏保</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #030712; }
    body {
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,.25), transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(168,85,247,.2), transparent 48%),
        linear-gradient(145deg, #030712, #0b1220);
    }
    .wrap { text-align: center; padding: 30px; }
    .title { font-size: clamp(28px, 4vw, 56px); font-weight: 700; letter-spacing: .03em; }
    .sub { margin-top: 14px; opacity: .85; font-size: clamp(14px, 1.6vw, 24px); }
    .clock { margin-top: 28px; font-size: clamp(36px, 6vw, 90px); font-weight: 800; }
    .date { margin-top: 10px; font-size: clamp(16px, 2vw, 30px); opacity: .9; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="title" class="title">校园电视播放系统</div>
    <div class="sub">当前没有播放计划</div>
    <div id="clock" class="clock">--:--:--</div>
    <div id="date" class="date">----</div>
  </div>
  <script>
    const q = new URLSearchParams(location.search);
    const t = q.get("title");
    if (t) document.getElementById("title").textContent = t;
    function tick() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
      document.getElementById("date").textContent = now.toLocaleDateString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", weekday: "long" });
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
