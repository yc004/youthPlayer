<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>播出保护</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #1e3a8a 0%, #0f172a 45%, #020617 100%);
      color: #e2e8f0;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      user-select: none;
    }
    .title {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: 2px;
      margin: 0 0 24px;
      text-shadow: 0 8px 24px rgba(15, 23, 42, 0.45);
    }
    .subtitle {
      font-size: 40px;
      font-weight: 600;
      margin: 0;
      opacity: 0.95;
    }
    .hint {
      margin-top: 36px;
      font-size: 24px;
      opacity: 0.75;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="title">播出系统运行中</p>
    <p class="subtitle">请勿干扰</p>
    <p class="hint">NON-BROADCAST SCREEN</p>
  </div>
</body>
</html>
